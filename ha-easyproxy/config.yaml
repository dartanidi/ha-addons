name: "EasyProxy Light"
version: "2.1.1"
slug: "easyproxy"
description: "Server Proxy Universale HLS (Versione Light). Modalità Rete Host."
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
host_network: true
options:
  port: 7860
  global_proxy: ""
  transport_routes: ""
  mpd_mode: "legacy"
  password: ""
  log_level: "WARNING"
schema:
  port: "port"
  global_proxy: "str?"
  transport_routes: "str?"
  mpd_mode: "list(legacy|ffmpeg)"
  password: "password?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)"
map:
  - "config:rw"
init: false
