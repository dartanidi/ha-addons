name: "StreamViX"
description: "Un addon per Stremio che estrae sorgenti streaming per film, serie TV, anime, TV live ed Eventi Sportivi."
version: "1.0.0"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
ports:
  7860/tcp: 7860
options:
  mfp_url: ""
  mfp_password: ""
  tmdb_api_key: ""
  animeunity_enabled: true
  animesaturn_enabled: true
  enable_live_tv: true
  addon_base_url: ""
  streamed_enable: true
  rbtv_enable: true
  spso_enable: true
  pd_enable: false
  tvtap_enable: false
  fast_dynamic: false
  dynamic_extractor_conc: 10
schema:
  mfp_url: "str?"
  mfp_password: "password?"
  tmdb_api_key: "str?"
  animeunity_enabled: "bool"
  animesaturn_enabled: "bool"
  enable_live_tv: "bool"
  addon_base_url: "str?"
  streamed_enable: "bool"
  rbtv_enable: "bool"
  spso_enable: "bool"
  pd_enable: "bool"
  tvtap_enable: "bool"
  fast_dynamic: "bool"
  dynamic_extractor_conc: "int"
