name: "EasyProxy Light"
version: "2.0.7"
slug: "easyproxy"
description: "Server Proxy Universale HLS con supporto FFmpeg. Versione Light."
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
ports:
  7860/tcp: 7860  # Esterna configurabile / Interna fissa
options:
  global_proxy: ""
  transport_routes: ""
  mpd_mode: "legacy"
  password: ""
  log_level: "WARNING"
schema:
  global_proxy: "str?"
  transport_routes: "str?"
  mpd_mode: "list(legacy|ffmpeg)"
  password: "password?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)"
map:
  - "config:rw"
init: false
