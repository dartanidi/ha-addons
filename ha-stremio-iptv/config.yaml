name: "Stremio IPTV addon"
version: "2.7.0"
slug: "stremio_iptv_addon"
description: "Add-on Stremio per Live TV tramite M3U, EPG e routing su EasyProxy."
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
host_network: true
init: false

map:
  - addon_config:rw

options:
  port: 3000
  dami_filter: ""
  epg_url: ""
  refresh_interval_minutes: 60
  easyproxy_url: ""
  easyproxy_password: ""
  logo_base_url: ""

schema:
  port: "port"
  dami_filter: "str?"
  epg_url: "str?"
  refresh_interval_minutes: "int"
  easyproxy_url: "str"
  easyproxy_password: "password?"
  logo_base_url: "str?"
