name: "EasyProxy Light"
version: "2.3.0"
slug: "easyproxy"
description: "Server Proxy Universale HLS (Versione Light). Ottimizzato 64-bit."
arch:
  - aarch64
  - amd64
startup: application
boot: auto
host_network: true

options:
  port: 7860
  api_password: ""
  global_proxy: ""
  transport_routes: ""
  log_level: "WARNING"
  flaresolverr_url: ""
  flaresolverr_timeout: 60

schema:
  port: "port"
  api_password: "password?"
  global_proxy: "str?"
  transport_routes: "str?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)"
  flaresolverr_url: "str?"
  flaresolverr_timeout: "int?"

map:
  - "config:rw"
init: false
